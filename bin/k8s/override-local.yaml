# Override values for local EC2 development deployment.
# Uses alirisheh876/<image>:remote-cu-amd64 images and tight resource limits
# so the whole stack fits on a t2.xlarge (4 vCPU / 16 GiB).

texera:
  imageRegistry: alirisheh876
  imageTag: remote-cu-amd64

texeraImages:
  pullPolicy: IfNotPresent

webserver:
  imageName: texera-web-application
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1536Mi

workflowComputingUnitManager:
  imageName: workflow-computing-unit-managing-service
  resources:
    requests:
      cpu: 20m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

workflowCompilingService:
  imageName: workflow-compiling-service
  resources:
    requests:
      cpu: 20m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

fileService:
  imageName: file-service
  resources:
    requests:
      cpu: 20m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

configService:
  imageName: config-service
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

accessControlService:
  imageName: access-control-service
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

workflowComputingUnitPool:
  imageName: computing-unit-master
  maxRequestedResources:
    cpu: 4
    memory: 8Gi
    nvidiaGpu: 0

postgresql:
  auth:
    postgresPassword: root_password
  primary:
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

minio:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

metrics-server:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      cpu: 200m
      memory: 200Mi

exampleDataLoader:
  enabled: false

yWebsocketServer:
  replicaCount: 0

pythonLanguageServer:
  replicaCount: 0

texeraEnvVars:
  - name: USER_SYS_ADMIN_USERNAME
    value: "texera"
  - name: USER_SYS_ADMIN_PASSWORD
    value: "texera"
  - name: STORAGE_JDBC_USERNAME
    value: postgres
  - name: USER_SYS_ENABLED
    value: "true"
  - name: SCHEDULE_GENERATOR_ENABLE_COST_BASED_SCHEDULE_GENERATOR
    value: "true"
  - name: MAX_WORKFLOW_WEBSOCKET_REQUEST_PAYLOAD_SIZE_KB
    value: "64"
  - name: MAX_NUM_OF_RUNNING_COMPUTING_UNITS_PER_USER
    value: "10"
  - name: KUBERNETES_COMPUTING_UNIT_CPU_LIMIT_OPTIONS
    value: "1"
  - name: KUBERNETES_COMPUTING_UNIT_MEMORY_LIMIT_OPTIONS
    value: "2Gi"
  - name: KUBERNETES_COMPUTING_UNIT_GPU_LIMIT_OPTIONS
    value: "0"
  - name: COMPUTING_UNIT_LOCAL_ENABLED
    value: "false"
  - name: KUBERNETES_COMPUTING_UNIT_ENABLED
    value: "true"
  - name: KUBERNETES_IMAGE_PULL_POLICY
    value: "IfNotPresent"
  - name: AWS_EC2_ENABLED
    value: "true"
  - name: AWS_EC2_DEFAULT_REGION
    value: "us-east-1"
  - name: AWS_EC2_INSTANCE_TYPE_OPTIONS
    value: "t2.micro,t2.small,t2.medium,t2.large,t2.xlarge"
  - name: AWS_EC2_COMPUTING_UNIT_PORT
    value: "8085"
  # Public hostname/IP that remote CUs use to reach Texera's DB / MinIO / LakeFS / file-service.
  # The manager rewrites in-cluster DNS names (texera-postgresql, texera-minio, texera-lakefs,
  # file-service-svc) in the CU master env vars to this host.
  - name: TEXERA_PUBLIC_HOST
    value: "18.209.213.109"
  - name: GUI_WORKFLOW_WORKSPACE_PYTHON_LANGUAGE_SERVER_PORT
    value: ""
  - name: GUI_WORKFLOW_WORKSPACE_PRODUCTION_SHARED_EDITING_SERVER
    value: "false"
  - name: GUI_LOGIN_LOCAL_LOGIN
    value: "true"
  - name: GUI_LOGIN_GOOGLE_LOGIN
    value: "false"
  - name: GUI_DATASET_SINGLE_FILE_UPLOAD_MAXIMUM_SIZE_MB
    value: "1024"
  - name: GUI_WORKFLOW_WORKSPACE_EXPORT_EXECUTION_RESULT_ENABLED
    value: "true"
  - name: GUI_WORKFLOW_WORKSPACE_WORKFLOW_EXECUTIONS_TRACKING_ENABLED
    value: "true"
  - name: GUI_WORKFLOW_WORKSPACE_ASYNC_RENDERING_ENABLED
    value: "true"
  - name: COMPUTING_UNIT_SHARING_ENABLED
    value: "true"
  - name: USER_SYS_INVITE_ONLY
    value: "false"
  - name: USER_SYS_GOOGLE_CLIENT_ID
    value: ""
  - name: USER_SYS_GOOGLE_SMTP_GMAIL
    value: ""
  - name: USER_SYS_GOOGLE_SMTP_PASSWORD
    value: ""
  - name: USER_SYS_DOMAIN
    value: ""
