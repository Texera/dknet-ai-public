{{- if .Values.litellm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-litellm-config
  namespace: {{ .Release.Namespace }}
data:
  config.yaml: |
{{ .Values.litellm.config | indent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-litellm-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  master-key: {{ .Values.litellm.masterKey | quote }}
  {{- range $k, $v := .Values.litellm.providerApiKeys }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-litellm
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-litellm
spec:
  replicas: {{ .Values.litellm.numOfPods | default 1 }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-litellm
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-litellm
    spec:
      containers:
        - name: litellm
          image: {{ .Values.litellm.image }}
          imagePullPolicy: IfNotPresent
          args:
            - "--config"
            - "/app/config/config.yaml"
            - "--port"
            - "4000"
          ports:
            - containerPort: 4000
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-litellm-secret
                  key: master-key
            {{- range $k, $v := .Values.litellm.providerApiKeys }}
            - name: {{ $k }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-litellm-secret
                  key: {{ $k }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-litellm
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-litellm
  ports:
    - port: 4000
      targetPort: 4000
      name: http
{{- end }}
