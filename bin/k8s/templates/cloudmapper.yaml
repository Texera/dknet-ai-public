{{- if .Values.cloudmapper.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudmapper
  labels:
    app: cloudmapper
spec:
  replicas: {{ .Values.cloudmapper.replicas | default 1 }}
  selector:
    matchLabels:
      app: cloudmapper
  template:
    metadata:
      labels:
        app: cloudmapper
    spec:
      volumes:
        - name: cloudmapper-file-volume
          persistentVolumeClaim:
            claimName: cloudmapper-pvc
        - name: aws-config-volume
          emptyDir: {}
        - name: ssh-key-volume
          secret:
            secretName: {{ .Values.cloudmapper.sshKeySecret | default "cloudmapper-ssh-key" }}
            defaultMode: 0600
        - name: cloudmapper-config-volume
          configMap:
            name: {{ .Values.cloudmapper.configMap | default "cloudmapper-config" }}
            items:
              - key: config.yaml
                path: config.yaml

      initContainers:
        - name: aws-config-setup
          image: ubuntu:22.04
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /aws-config;
              echo "[default]" > /aws-config/credentials;
              echo "aws_access_key_id = $AWS_ACCESS_KEY_ID" >> /aws-config/credentials;
              echo "aws_secret_access_key = $AWS_SECRET_ACCESS_KEY" >> /aws-config/credentials;
              echo "[default]" > /aws-config/config;
              echo "region = {{ .Values.cloudmapper.awsRegion | default "us-west-1" }}" >> /aws-config/config;
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cloudmapper.awsSecret | default "cloudmapper-aws-credentials" }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cloudmapper.awsSecret | default "cloudmapper-aws-credentials" }}
                  key: AWS_SECRET_ACCESS_KEY
          volumeMounts:
            - name: aws-config-volume
              mountPath: /aws-config

      containers:
        - name: cloudmapper
          image: "{{ .Values.cloudmapper.image | default "alirisheh876/cloudmapper:latest" }}"
          imagePullPolicy: {{ .Values.cloudmapper.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 4000
          {{- with .Values.cloudmapper.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: cloudmapper-file-volume
              mountPath: "/data"
            - name: aws-config-volume
              mountPath: /root/.aws
            - name: ssh-key-volume
              mountPath: /root/.ssh
              readOnly: true
            - name: cloudmapper-config-volume
              mountPath: /app/config/config.yaml
              subPath: config.yaml
      nodeSelector:
        kubernetes.io/arch: amd64

---
apiVersion: v1
kind: Service
metadata:
  name: cloudmapper-service
spec:
  selector:
    app: cloudmapper
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
  type: ClusterIP
{{- end }}
