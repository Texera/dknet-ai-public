{{- if .Values.agentService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-agent-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-agent-service
spec:
  replicas: {{ .Values.agentService.numOfPods | default 1 }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-agent-service
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-agent-service
    spec:
      containers:
        - name: agent-service
          image: {{ .Values.texera.imageRegistry }}/{{ .Values.agentService.imageName }}:{{ .Values.texera.imageTag }}
          imagePullPolicy: {{ .Values.texeraImages.pullPolicy }}
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: LLM_API_KEY
              value: {{ .Values.agentService.env.llmApiKey | quote }}
            - name: LLM_ENDPOINT
              value: "http://{{ .Release.Name }}-litellm.{{ .Release.Namespace }}:4000"
            - name: TEXERA_DASHBOARD_SERVICE_ENDPOINT
              value: "http://{{ .Release.Name }}-{{ .Values.webserver.name }}.{{ .Release.Namespace }}:{{ .Values.webserver.service.port }}"
            - name: WORKFLOW_COMPILING_SERVICE_ENDPOINT
              value: "http://workflow-compiling-service-svc.{{ .Release.Namespace }}:9090"
            - name: WORKFLOW_EXECUTION_SERVICE_ENDPOINT
              value: "http://localhost:8085"
            - name: LOG_PRETTY
              value: "false"
            - name: TEXERA_SERVICE_LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-agent-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-agent-service
  ports:
    - port: 3001
      targetPort: 3001
      name: http
{{- end }}
